<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rural Health Camp Organizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .navbar { background: #2E86AB; }
        .card { border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-card { text-align: center; padding: 20px; border-radius: 12px; color: white; }
        .high { background: #FF6B6B; }
        .medium { background: #FFB347; }
        .normal { background: #6BCB77; }
        .total { background: #2E86AB; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold fs-4">🏥 Rural Health Camp Organizer</span>
</nav>

<div class="container mt-4">

    <!-- Register Camp Form -->
    <div class="card p-4 mb-4">
        <h4 class="mb-3">➕ Register New Camp</h4>
        <div class="row g-3">
            <div class="col-md-6">
                <input type="text" id="camp_name" class="form-control" placeholder="Camp Name">
            </div>
            <div class="col-md-3">
                <input type="date" id="camp_date" class="form-control">
            </div>
            <div class="col-md-3">
                <input type="text" id="village" class="form-control" placeholder="Village">
            </div>
            <div class="col-md-4">
                <input type="text" id="district" class="form-control" placeholder="District">
            </div>
            <div class="col-md-4">
                <input type="text" id="organized_by" class="form-control" placeholder="Organized By">
            </div>
            <div class="col-md-4">
                <input type="text" id="doctors" class="form-control" placeholder="Doctors (comma separated)">
            </div>
            <div class="col-md-6">
                <input type="number" id="latitude" class="form-control" placeholder="Latitude (e.g. 16.7)">
            </div>
            <div class="col-md-6">
                <input type="number" id="longitude" class="form-control" placeholder="Longitude (e.g. 74.5)">
            </div>
            <div class="col-12">
                <button class="btn btn-primary px-4" onclick="createCamp()">Create Camp</button>
            </div>
        </div>
        <div id="camp_msg" class="mt-3"></div>
    </div>

    <!-- Register Patient Form -->
    <div class="card p-4 mb-4">
        <h4 class="mb-3">👤 Register Patient</h4>
        <div class="row g-3">
            <div class="col-md-6">
                <input type="text" id="p_name" class="form-control" placeholder="Patient Name">
            </div>
            <div class="col-md-2">
                <input type="number" id="p_age" class="form-control" placeholder="Age">
            </div>
            <div class="col-md-2">
                <select id="p_gender" class="form-select">
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="text" id="p_phone" class="form-control" placeholder="Phone">
            </div>
            <div class="col-md-6">
                <input type="text" id="p_village" class="form-control" placeholder="Village">
            </div>
            <div class="col-md-6">
                <input type="text" id="p_camp_id" class="form-control" placeholder="Camp ID">
            </div>
            <div class="col-12">
                <button class="btn btn-success px-4" onclick="registerPatient()">Register Patient</button>
            </div>
        </div>
        <div id="patient_msg" class="mt-3"></div>
    </div>

    <!-- Record Vitals Form -->
    <div class="card p-4 mb-4">
        <h4 class="mb-3">🩺 Record Vitals</h4>
        <div class="row g-3">
            <div class="col-md-6">
                <input type="text" id="v_patient_id" class="form-control" placeholder="Patient DB ID">
            </div>
            <div class="col-md-6">
                <input type="text" id="v_camp_id" class="form-control" placeholder="Camp ID">
            </div>
            <div class="col-md-3">
                <input type="text" id="v_bp" class="form-control" placeholder="Blood Pressure (e.g. 130/85)">
            </div>
            <div class="col-md-3">
                <input type="number" id="v_sugar" class="form-control" placeholder="Blood Sugar (mg/dL)">
            </div>
            <div class="col-md-3">
                <input type="number" id="v_weight" class="form-control" placeholder="Weight (kg)">
            </div>
            <div class="col-md-3">
                <input type="number" id="v_height" class="form-control" placeholder="Height (cm)">
            </div>
            <div class="col-md-3">
                <input type="number" id="v_hb" class="form-control" placeholder="Hemoglobin (g/dL)">
            </div>
            <div class="col-md-5">
                <input type="text" id="v_diagnosis" class="form-control" placeholder="Diagnosis">
            </div>
            <div class="col-md-4">
                <input type="text" id="v_medicines" class="form-control" placeholder="Medicines (comma separated)">
            </div>
            <div class="col-12">
                <button class="btn btn-warning px-4" onclick="recordVitals()">Record Vitals</button>
            </div>
        </div>
        <div id="vitals_msg" class="mt-3"></div>
    </div>

    <!-- Download Report -->
    <div class="card p-4 mb-4">
        <h4 class="mb-3">📄 Download Camp Report</h4>
        <div class="row g-3 align-items-end">
            <div class="col-md-8">
                <input type="text" id="report_camp_id" class="form-control" placeholder="Enter Camp ID">
            </div>
            <div class="col-md-4">
                <button class="btn btn-danger w-100" onclick="downloadReport()">⬇️ Download PDF</button>
            </div>
        </div>
    </div>

</div>

<script>
const API = "http://127.0.0.1:8000";

async function createCamp() {
    const data = {
        camp_name: document.getElementById("camp_name").value,
        date: document.getElementById("camp_date").value,
        village: document.getElementById("village").value,
        district: document.getElementById("district").value,
        state: "Maharashtra",
        organized_by: document.getElementById("organized_by").value,
        doctors: document.getElementById("doctors").value.split(",").map(d => d.trim()),
        location: {
            latitude: parseFloat(document.getElementById("latitude").value),
            longitude: parseFloat(document.getElementById("longitude").value)
        },
        status: "upcoming"
    };
    const res = await fetch(`${API}/camps/`, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(data)});
    const json = await res.json();
    document.getElementById("camp_msg").innerHTML = `<div class="alert alert-success">✅ Camp Created! ID: <b>${json.camp_id}</b> (save this!)</div>`;
}

async function registerPatient() {
    const data = {
        name: document.getElementById("p_name").value,
        age: parseInt(document.getElementById("p_age").value),
        gender: document.getElementById("p_gender").value,
        phone: document.getElementById("p_phone").value,
        village: document.getElementById("p_village").value,
        camp_id: document.getElementById("p_camp_id").value
    };
    const res = await fetch(`${API}/patients/`, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(data)});
    const json = await res.json();
    document.getElementById("patient_msg").innerHTML = `<div class="alert alert-success">✅ Patient Registered! ID: <b>${json.db_id}</b> (save this!)</div>`;
}

async function recordVitals() {
    const data = {
        patient_id: document.getElementById("v_patient_id").value,
        camp_id: document.getElementById("v_camp_id").value,
        blood_pressure: document.getElementById("v_bp").value,
        blood_sugar: parseFloat(document.getElementById("v_sugar").value),
        weight: parseFloat(document.getElementById("v_weight").value),
        height: parseFloat(document.getElementById("v_height").value),
        hemoglobin: parseFloat(document.getElementById("v_hb").value),
        diagnosis: document.getElementById("v_diagnosis").value,
        medicines_given: document.getElementById("v_medicines").value.split(",").map(m => m.trim())
    };
    const res = await fetch(`${API}/vitals/`, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(data)});
    const json = await res.json();
    document.getElementById("vitals_msg").innerHTML = `
        <div class="alert alert-${json.risk_level === 'High' ? 'danger' : json.risk_level === 'Medium' ? 'warning' : 'success'}">
            ✅ Vitals Recorded! BMI: <b>${json.bmi}</b> | Risk: <b>${json.risk_level}</b><br>
            Flags: ${json.risk_flags.join(", ") || "None"}
        </div>`;
}

function downloadReport() {
    const campId = document.getElementById("report_camp_id").value;
    window.open(`${API}/reports/${campId}`, "_blank");
}
</script>
</body>
</html>
